<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="CodeMedic AI — an intelligent debug assistant that helps you diagnose and fix code issues." />
    <title>CodeMedic AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ===== HEADER / NAVBAR ===== -->
    <header class="header" id="header">
        <div class="header__brand">
            <!-- Simple SVG logo -->
            <svg class="header__logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="8" fill="var(--accent)" />
                <path d="M10 16L14 20L22 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <h1 class="header__title">CodeMedic <span class="header__title--accent">AI</span></h1>
        </div>

        <div class="header__actions">
            <!-- New Chat button -->
            <button class="btn btn--ghost" id="newChatBtn" title="New Chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>New Chat</span>
            </button>

            <!-- Dark mode toggle -->
            <button class="btn btn--icon" id="themeToggle" title="Toggle dark mode">
                <!-- Sun icon (shown in dark mode) -->
                <svg class="icon icon--sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg class="icon icon--moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- ===== MAIN CHAT AREA ===== -->
    <main class="chat" id="chat">

        <!-- Welcome message shown when chat is empty -->
        <div class="welcome" id="welcome">
            <div class="welcome__icon">
                <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="var(--accent)" />
                    <path d="M10 16L14 20L22 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h2 class="welcome__title">How can I help you debug?</h2>
            <p class="welcome__subtitle">Paste your error, describe a bug, or share a code snippet to get started.</p>

            <div class="welcome__suggestions">
                <button class="suggestion-chip" data-prompt="Why is my function returning undefined?">Why is my function
                    returning undefined?</button>
                <button class="suggestion-chip"
                    data-prompt="Explain this error: TypeError: Cannot read properties of null">Explain this error:
                    TypeError…</button>
                <button class="suggestion-chip" data-prompt="Review this code for potential bugs">Review my code for
                    bugs</button>
            </div>
        </div>

        <!-- Messages will be appended here by JS -->
    </main>

    <!-- ===== INPUT BAR ===== -->
    <footer class="input-bar" id="inputBar">
        <div class="input-bar__container">
            <textarea class="input-bar__textarea" id="userInput" placeholder="Describe your bug or paste code…"
                rows="1"></textarea>

            <div class="input-bar__actions">
                <!-- Attach code placeholder button -->
                <button class="btn btn--icon" id="attachBtn" title="Attach code (coming soon)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                        </path>
                    </svg>
                </button>

                <!-- Send button -->
                <button class="btn btn--primary" id="sendBtn" title="Send message" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </footer>

    <!-- JS loaded in dependency order (no modules — works with file://) -->
    <script src="js/theme.js"></script>
    <script src="js/replies.js"></script>
    <script src="js/chat.js"></script>
    <script src="app.js"></script>
</body>

</html>
